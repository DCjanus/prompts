name: script dependency report

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup uv
        uses: astral-sh/setup-uv@v8.2.0
      - name: Scan uv script dependencies
        run: ./scripts/check_script_deps.py --github-summary
