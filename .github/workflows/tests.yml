name: tests

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  unittest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
      - name: Setup uv
        uses: astral-sh/setup-uv@v8.2.0
      - name: Run tests
        run: >
          uv run
          --with markdown-it-py
          python -m unittest skills/confluence-cli/scripts/tests/test_markdown_to_storage.py
      - name: Run install Codex CLI tests
        run: >
          uv run
          --with pydantic
          --with rich
          --with typer
          --with zstandard
          python -m unittest scripts/tests/test_install_codex_cli.py
