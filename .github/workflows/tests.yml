name: tests

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  script-dependency-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
      - name: Setup uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: false
      - name: Check uv script dependencies
        run: ./scripts/script_deps.py --only-attention --fail-on-attention --github-summary

  unittest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
      - name: Setup uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: false
      - name: Run tests
        run: >
          uv run
          --with markdown-it-py
          python -m unittest skills/confluence-cli/scripts/tests/test_markdown_to_storage.py
      - name: Run install Codex CLI tests
        run: >
          uv run
          --with pydantic
          --with rich
          --with typer
          --with zstandard
          python -m unittest scripts/tests/test_install_codex_cli.py
      - name: Run Jira CLI tests
        run: >
          uv run
          --with httpx2
          --with pydantic
          --with rich
          --with tomli-w
          --with typer
          python -m unittest discover -s skills/jira-cli/scripts/tests
      - name: Run upstream skill checker tests
        run: uv run --python 3.11 python -m unittest scripts/tests/test_upstream_skills.py
